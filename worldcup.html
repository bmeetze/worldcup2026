<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026</title>
<style>
  :root{
    --bg:#fafafa; --card:#ffffff; --line:#e5e7eb; --ink:#111111;
    --muted:#6b7280; --accent:#16a34a; --accent-soft:#dcfce7; --warn:#f59e0b;
    --radius:8px; --maxw:760px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45}
  header{background:var(--card);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10}
  .bar{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;
    justify-content:space-between;padding:12px 16px}
  .brand{font-weight:700}
  nav.tabs{max-width:var(--maxw);margin:0 auto;display:flex;gap:4px;
    padding:0 8px;overflow-x:auto}
  nav.tabs a{padding:10px 12px;color:var(--muted);text-decoration:none;
    border-bottom:2px solid transparent;white-space:nowrap;font-size:14px}
  nav.tabs a.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
  main{max-width:var(--maxw);margin:0 auto;padding:16px}
  .panel{display:none}
  .panel.active{display:block}
  .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--muted);font-weight:700;margin:18px 0 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px;margin-bottom:8px}
  .empty{color:var(--muted);padding:24px 0;text-align:center}
  /* Mobile: tabs become a fixed bottom bar */
  @media (max-width:640px){
    header{position:static}
    nav.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);
      border-top:1px solid var(--line);justify-content:space-around;padding:0;max-width:none}
    nav.tabs a{flex:1;text-align:center;border-bottom:none;border-top:2px solid transparent;font-size:12px}
    nav.tabs a.active{border-top-color:var(--accent);border-bottom:none}
    main{padding-bottom:72px}
  }
</style>
</head>
<body>
<header>
  <div class="bar"><span class="brand">World Cup 2026</span><span id="clock" class="label" style="margin:0"></span></div>
  <nav class="tabs">
    <a href="#today" data-tab="today">Today</a>
    <a href="#upcoming" data-tab="upcoming">Upcoming</a>
    <a href="#myteams" data-tab="myteams">My Teams</a>
    <a href="#standings" data-tab="standings">Standings</a>
    <a href="#bracket" data-tab="bracket">Bracket</a>
  </nav>
</header>
<main>
  <section id="today" class="panel"></section>
  <section id="upcoming" class="panel"></section>
  <section id="myteams" class="panel"></section>
  <section id="standings" class="panel"></section>
  <section id="bracket" class="panel"></section>
</main>

<script type="application/json" id="wc-data">{"meta":{},"teams":[],"matches":[]}</script>

<script>
"use strict";
const WC = JSON.parse(document.getElementById('wc-data').textContent);

// ---- formatting helpers (local timezone) ----
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
function kickoff(m){ return new Date(m.kickoffUtc); }
function fmtTime(m){ return kickoff(m).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }
function fmtDay(m){ return kickoff(m).toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'}); }
function isSameLocalDay(d, ref){
  return d.getFullYear()===ref.getFullYear() && d.getMonth()===ref.getMonth() && d.getDate()===ref.getDate();
}
function teamLabel(m, side){ // side: 'home'|'away'
  const name = side==='home'? m.homeName : m.awayName;
  const code = side==='home'? m.home : m.away;
  const t = WC.teams.find(t=>t.code===code);
  const flag = t && t.flag ? t.flag+' ' : '';
  return flag + name;
}
function scoreOrTime(m){
  if (m.status==='finished' || m.status==='live'){
    const live = m.status==='live' ? ' <span style="color:var(--accent)">●</span>' : '';
    return `<strong>${m.homeScore ?? 0}–${m.awayScore ?? 0}</strong>${live}`;
  }
  return `<span style="color:var(--muted)">${fmtTime(m)}</span>`;
}
function matchRow(m){
  return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
    <span>${teamLabel(m,'home')} <span style="color:var(--muted)">v</span> ${teamLabel(m,'away')}</span>
    <span>${scoreOrTime(m)}</span></div>`;
}
function matchRowWithCal(m){
  return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
    <span>${teamLabel(m,'home')} <span style="color:var(--muted)">v</span> ${teamLabel(m,'away')}</span>
    <span style="display:flex;align-items:center;gap:10px">${scoreOrTime(m)}
      <button onclick="addMatchToCalendar('${m.id}')" title="Add to calendar"
        style="border:1px solid var(--line);background:var(--card);border-radius:6px;cursor:pointer;padding:4px 8px;font-size:12px">📅</button>
    </span></div>`;
}
function sortedMatches(){ return [...WC.matches].sort((a,b)=>a.kickoffUtc.localeCompare(b.kickoffUtc)); }

// ---- standings (computed from finished group matches) ----
// Tiebreak: points, then goal difference, then goals for, then team name.
// Note: head-to-head and fair-play tiebreaks are intentionally not implemented (personal v1).
function computeGroup(groupLetter){
  const teams = WC.teams.filter(t=>t.group===groupLetter);
  const table = new Map(teams.map(t=>[t.code,
    {code:t.code, name:t.name, flag:t.flag, P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0}]));
  const games = WC.matches.filter(m=>m.stage==='group' && m.group===groupLetter && m.status==='finished'
    && table.has(m.home) && table.has(m.away) && m.homeScore!=null && m.awayScore!=null);
  for (const m of games){
    const h = table.get(m.home), a = table.get(m.away);
    h.P++; a.P++; h.GF+=m.homeScore; h.GA+=m.awayScore; a.GF+=m.awayScore; a.GA+=m.homeScore;
    if (m.homeScore>m.awayScore){ h.W++; h.Pts+=3; a.L++; }
    else if (m.homeScore<m.awayScore){ a.W++; a.Pts+=3; h.L++; }
    else { h.D++; a.D++; h.Pts++; a.Pts++; }
  }
  const rows = [...table.values()];
  for (const r of rows) r.GD = r.GF - r.GA;
  rows.sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || x.name.localeCompare(y.name));
  return rows;
}
function allGroupLetters(){ return [...new Set(WC.teams.map(t=>t.group))].filter(Boolean).sort(); }

// ---- .ics calendar export ----
function icsStamp(d){ // UTC -> YYYYMMDDTHHMMSSZ
  return d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
}
function matchTitle(m){ return `${m.homeName} v ${m.awayName} (WC 2026)`; }
function vevent(m){
  const start = kickoff(m);
  const end = new Date(start.getTime() + 2*3.6e6); // 2 hours
  return [
    'BEGIN:VEVENT',
    `UID:${m.id}@worldcup2026`,
    `DTSTAMP:${icsStamp(new Date(0))}`,
    `DTSTART:${icsStamp(start)}`,
    `DTEND:${icsStamp(end)}`,
    `SUMMARY:${matchTitle(m)}`,
    m.venue ? `LOCATION:${m.venue}` : '',
    'BEGIN:VALARM','TRIGGER:-PT30M','ACTION:DISPLAY','DESCRIPTION:Kickoff soon','END:VALARM',
    'END:VEVENT',
  ].filter(Boolean).join('\r\n');
}
function buildIcs(matches){
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//worldcup2026//EN',
    ...matches.map(vevent),'END:VCALENDAR'].join('\r\n');
}
function downloadIcs(filename, matches){
  const blob = new Blob([buildIcs(matches)], {type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}
// expose for inline onclick handlers
window.addMatchToCalendar = (id) => {
  const m = WC.matches.find(x=>x.id===id);
  if (m) downloadIcs(`${m.home}-${m.away}.ics`, [m]);
};

// ---- tab routing (hash-based; works on file:// and Pages) ----
const TABS = ['today','upcoming','myteams','standings','bracket'];
function currentTab(){
  const h = location.hash.replace('#','');
  return TABS.includes(h) ? h : 'today';
}
function render(){
  const tab = currentTab();
  document.querySelectorAll('nav.tabs a').forEach(a=>{
    a.classList.toggle('active', a.dataset.tab===tab);
  });
  document.querySelectorAll('.panel').forEach(p=>{
    p.classList.toggle('active', p.id===tab);
  });
  RENDERERS[tab] && RENDERERS[tab](document.getElementById(tab));
}
let _countdownTimer = null;
function startCountdown(next){
  if (_countdownTimer){ clearInterval(_countdownTimer); _countdownTimer=null; }
  if (!next) return;
  const tick = () => {
    const el = document.getElementById('countdown');
    if (!el){ clearInterval(_countdownTimer); return; }
    const ms = kickoff(next) - new Date();
    if (ms <= 0){ el.textContent = 'kicking off'; clearInterval(_countdownTimer); return; }
    const h = Math.floor(ms/3.6e6), mn = Math.floor((ms%3.6e6)/6e4);
    const d = Math.floor(h/24);
    el.textContent = d>0 ? `in ${d}d ${h%24}h` : `in ${h}h ${mn}m`;
  };
  tick();
  _countdownTimer = setInterval(tick, 1000);
}

// Renderers are filled in by later tasks; default placeholder for now.
const RENDERERS = {
  today: el => {
    const now = new Date();
    const all = sortedMatches();
    const next = all.find(m => kickoff(m) > now && m.status!=='finished');
    const todays = all.filter(m => isSameLocalDay(kickoff(m), now));
    let html = '';
    if (next){
      html += `<div class="label">Up Next</div>
        <div class="card" style="border-left:3px solid var(--accent)">
          <div style="font-weight:700;font-size:18px">${teamLabel(next,'home')} <span style="color:var(--muted);font-weight:400">v</span> ${teamLabel(next,'away')}</div>
          <div style="color:var(--muted);margin-top:4px">${fmtDay(next)} · ${fmtTime(next)} · <span id="countdown"></span></div>
        </div>`;
    }
    html += `<div class="label">Today (${TZ})</div>`;
    html += todays.length ? todays.map(matchRow).join('') : '<div class="empty">No matches today</div>';
    el.innerHTML = html;
    startCountdown(next);
  },
  upcoming: el => {
    const now = new Date();
    const future = sortedMatches().filter(m => kickoff(m) >= new Date(now.getFullYear(),now.getMonth(),now.getDate()));
    if (!future.length){ el.innerHTML = '<div class="empty">No upcoming matches</div>'; return; }
    let html = '', lastDay = '';
    for (const m of future){
      const day = fmtDay(m);
      if (day !== lastDay){ html += `<div class="label">${day}</div>`; lastDay = day; }
      html += matchRowWithCal(m);
    }
    el.innerHTML = html;
  },
  myteams: el => el.innerHTML = '<div class="empty">My Teams — coming soon</div>',
  standings: el => {
    const groups = allGroupLetters();
    if (!groups.length){ el.innerHTML = '<div class="empty">No groups</div>'; return; }
    let html = '';
    for (const g of groups){
      const rows = computeGroup(g);
      html += `<div class="label">Group ${g}</div><div class="card" style="padding:0">
        <table style="width:100%;border-collapse:collapse;font-size:14px">
        <thead><tr style="color:var(--muted);font-size:12px">
          <th style="text-align:left;padding:8px">Team</th><th>P</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
      rows.forEach((r,i)=>{
        const qual = i<2 ? 'background:var(--accent-soft)' : (i===2 ? 'background:#fef3c7' : '');
        html += `<tr style="border-top:1px solid var(--line);${qual}">
          <td style="text-align:left;padding:8px">${r.flag?r.flag+' ':''}${r.name}</td>
          <td style="text-align:center">${r.P}</td>
          <td style="text-align:center">${r.GD>0?'+':''}${r.GD}</td>
          <td style="text-align:center;font-weight:700">${r.Pts}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    }
    html += `<p style="color:var(--muted);font-size:12px;margin-top:12px">Green = top 2 (qualify). Amber = 3rd (best-third watch). Ties broken by GD, then GF, then name.</p>`;
    el.innerHTML = html;
  },
  bracket: el => el.innerHTML = '<div class="empty">Bracket — coming soon</div>',
};
window.addEventListener('hashchange', render);
function updateClock(){ const c=document.getElementById('clock'); if(c) c.textContent = new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }
setInterval(updateClock, 1000); updateClock();
render();
// ---- self tests: open worldcup.html?selftest=1 to run ----
function runSelfTests(){
  const results = [];
  const assert = (name, cond) => results.push({name, pass: !!cond});
  const saveTeams = WC.teams, saveMatches = WC.matches;
  WC.teams = [
    {code:'AA',name:'Alpha',flag:'',group:'Z'},
    {code:'BB',name:'Bravo',flag:'',group:'Z'},
    {code:'CC',name:'Cesar',flag:'',group:'Z'},
  ];
  WC.matches = [
    {stage:'group',group:'Z',home:'AA',away:'BB',status:'finished',homeScore:2,awayScore:0},
    {stage:'group',group:'Z',home:'BB',away:'CC',status:'finished',homeScore:1,awayScore:1},
    {stage:'group',group:'Z',home:'AA',away:'CC',status:'finished',homeScore:0,awayScore:0},
  ];
  const t = computeGroup('Z');
  assert('Alpha tops group (4 pts)', t[0].code==='AA' && t[0].Pts===4);
  assert('GD computed for Alpha (+2)', t[0].GD===2);
  assert('All three teams ranked', t.length===3);
  assert('Bravo above Cesar on GD/name fallback', t.findIndex(r=>r.code==='BB') < t.findIndex(r=>r.code==='CC') || t[1].Pts===t[2].Pts);
  const ics = buildIcs([{id:'x',homeName:'A',awayName:'B',kickoffUtc:'2026-06-11T20:00:00Z',venue:'V'}]);
  assert('ICS has VEVENT', /BEGIN:VEVENT[\s\S]*END:VEVENT/.test(ics));
  assert('ICS has 30-min alarm', /TRIGGER:-PT30M/.test(ics));
  WC.teams = saveTeams; WC.matches = saveMatches;
  const pass = results.filter(r=>r.pass).length;
  document.body.innerHTML = `<main style="padding:24px">
    <h2>Self tests: ${pass}/${results.length} passed</h2>
    <ul>${results.map(r=>`<li>${r.pass?'✅':'❌'} ${r.name}</li>`).join('')}</ul></main>`;
  console.log('Self tests:', results);
}
if (new URLSearchParams(location.search).get('selftest')==='1') runSelfTests();
</script>
</body>
</html>
